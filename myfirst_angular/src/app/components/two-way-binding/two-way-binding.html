<input type="text" [(ngModel)]="task" placeholder="enter task">
<button (click)="addTask()">Add Task</button>

<table>
    @for(item of taskList; track item.id){
        <tr>
            <td>{{item.id}}</td>
            <td>{{item.task}}</td>
            <td><button (click)="deleteTask(item.id)">Delete</button></td>
        </tr>
    }
</table>
